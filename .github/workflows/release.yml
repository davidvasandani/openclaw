name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a GitHub release'
        required: true
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Get commit hash
        id: commit
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Create distributable tarball
        run: |
          tar -czf openclaw-fork-${{ steps.commit.outputs.short_sha }}.tar.gz \
            dist/ \
            package.json \
            openclaw.mjs \
            extensions/ \
            assets/ \
            skills/ \
            patches/ \
            scripts/postinstall.js \
            scripts/format-staged.js \
            scripts/setup-git-hooks.js \
            git-hooks/ \
            README.md \
            README-header.png \
            CHANGELOG.md \
            LICENSE

      - name: Get version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if upstream release exists
        id: upstream_check
        run: |
          # Check if this tag exists in upstream openclaw/openclaw
          UPSTREAM_RELEASE_URL="https://github.com/openclaw/openclaw/releases/tag/${{ github.ref_name }}"
          if curl --output /dev/null --silent --head --fail "$UPSTREAM_RELEASE_URL"; then
            echo "upstream_exists=true" >> $GITHUB_OUTPUT
            echo "upstream_url=$UPSTREAM_RELEASE_URL" >> $GITHUB_OUTPUT
            echo "::notice::Upstream release found: $UPSTREAM_RELEASE_URL"
          else
            echo "upstream_exists=false" >> $GITHUB_OUTPUT
            echo "::notice::No upstream release found for ${{ github.ref_name }}"
          fi

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name == 'main' && format('v{0}', steps.version.outputs.version) || github.ref_name }}
          name: ${{ github.ref_name == 'main' && format('Release v{0}', steps.version.outputs.version) || github.ref_name }}
          draft: false
          prerelease: false
          files: openclaw-fork-${{ steps.commit.outputs.short_sha }}.tar.gz
          body: |
            ## OpenClaw Fork Build

            ${{ steps.upstream_check.outputs.upstream_exists == 'true' && format('**Based on upstream:** [openclaw/openclaw {0}]({1})', github.ref_name, steps.upstream_check.outputs.upstream_url) || '**Fork-specific release**' }}

            **Commit:** ${{ github.sha }}
            **Short SHA:** ${{ steps.commit.outputs.short_sha }}
            **Version:** ${{ steps.version.outputs.version }}

            ### Fork Optimizations

            This fork includes the following enhancements over upstream:
            - 📦 **Package size:** 5.6 MB (90% reduction from ~50MB)
            - ⚡ **Optimized extensions:** Excluded test files and documentation
            - 🤖 **Automated releases:** GitHub Actions workflow for consistent builds
            - 🔄 **Daily upstream sync:** Automatically syncs with openclaw/openclaw

            ### Installation

            Download and extract the tarball:
            ```bash
            wget https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/openclaw-fork-${{ steps.commit.outputs.short_sha }}.tar.gz
            tar -xzf openclaw-fork-${{ steps.commit.outputs.short_sha }}.tar.gz
            cd openclaw
            npm install --omit=dev
            ```

            ### What's Included

            - Pre-built distribution (`dist/`)
            - All 32 extensions (TypeScript source)
            - Runtime assets and skills
            - Post-install scripts and git hooks

            ### Changes

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/CHANGELOG.md) for details.
            ${{ steps.upstream_check.outputs.upstream_exists == 'true' && format('

            For upstream changes, see the [upstream release notes]({0}).', steps.upstream_check.outputs.upstream_url) || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifact
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-fork-${{ steps.commit.outputs.short_sha }}
          path: openclaw-fork-${{ steps.commit.outputs.short_sha }}.tar.gz
          retention-days: 30
